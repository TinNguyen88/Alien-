<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>NGƯỜI NGOÀI HÀNH TINH XÂM CHIẾM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0020;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#wrap{position:relative;display:flex;flex-direction:column;align-items:center;}
canvas{display:block;border-radius:16px;box-shadow:0 0 40px rgba(150,0,255,.4);}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,0,20,.82);text-align:center;padding:24px;}
.gtitle{font-size:clamp(1.3rem,5.5vw,2.2rem);font-weight:900;color:#fff;letter-spacing:2px;line-height:1.15;margin-bottom:6px;text-shadow:0 0 20px #b06fff;}
.tagline{font-size:.72rem;color:rgba(200,150,255,.6);letter-spacing:2px;margin-bottom:4px;font-style:italic;}
.by{font-size:.65rem;color:rgba(255,255,255,.3);letter-spacing:2px;margin-bottom:24px;}
.score-big{font-size:clamp(2.8rem,11vw,4.5rem);font-weight:900;color:#FFD700;line-height:1;text-shadow:0 0 16px rgba(255,215,0,.5);}
.slabel{font-size:.7rem;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.best{font-size:.9rem;color:rgba(255,255,255,.6);margin-bottom:22px;}
.best span{color:#FFD700;font-weight:700;}
.pbtn{border:none;border-radius:50px;padding:13px 36px;font-size:1rem;font-weight:800;color:#fff;letter-spacing:1px;cursor:pointer;-webkit-appearance:none;margin-bottom:8px;}
.pbtn-start{background:linear-gradient(135deg,#7C3AED,#4F46E5);box-shadow:0 4px 18px rgba(124,58,237,.5);}
.pbtn-again{background:linear-gradient(135deg,#DC2626,#B91C1C);box-shadow:0 4px 18px rgba(220,38,38,.5);}
.go-title{font-size:clamp(1.2rem,5vw,2rem);font-weight:900;color:#EF4444;letter-spacing:2px;margin-bottom:4px;}
.hint{font-size:.68rem;color:rgba(255,255,255,.28);letter-spacing:1px;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div class="overlay" id="ostart">
    <div class="gtitle">👽 NGƯỜI NGOÀI<br>HÀNH TINH<br>XÂM CHIẾM</div>
    <div class="tagline">Thức ăn Trái Đất sẽ là của ta! 🍜</div>
    <div class="by">BY NGUYỄN TRUNG TÍN</div>
    <button class="pbtn pbtn-start" id="bstart">🚀 BẮT ĐẦU</button>
    <div class="hint">Chạm · Click để bắn laser</div>
  </div>

  <div class="overlay" id="ogo" style="display:none">
    <div class="go-title">🌍 TRÁI ĐẤT<br>ĐÃ CHIẾN THẮNG!</div>
    <div class="tagline" style="margin-bottom:18px">Bánh bao & phở đã đánh bại UFO...</div>
    <div class="slabel">Điểm xâm chiếm</div>
    <div class="score-big" id="goscore">0</div>
    <div class="best">Best: <span id="gobest">0</span></div>
    <button class="pbtn pbtn-again" id="bagain">👽 XÂM CHIẾM LẠI</button>
  </div>
</div>

<script>
// ── roundRect polyfill ──
(function(){
  var p=CanvasRenderingContext2D.prototype;
  if(p.roundRect)return;
  p.roundRect=function(x,y,w,h,r){
    if(Array.isArray(r))r=r[0]||0;
    r=Math.min(Number(r)||0,Math.abs(w)/2,Math.abs(h)/2);
    if(r<=0){this.rect(x,y,w,h);return this;}
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();return this;
  };
})();

var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);

function resize(){
  var vw=window.innerWidth,vh=window.innerHeight;
  var cw=vw<=500?vw-8:Math.min(vw-24,420);
  var ch=vw<=500?vh-20:Math.min(vh-20,700);
  if(cw/ch>0.65){cw=Math.round(ch*0.62);}else{ch=Math.round(cw/0.62);}
  canvas.style.width=cw+'px';canvas.style.height=ch+'px';
  canvas.width=Math.round(cw*DPR);canvas.height=Math.round(ch*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
function GW(){return parseInt(canvas.style.width)||canvas.width/DPR;}
function GH(){return parseInt(canvas.style.height)||canvas.height/DPR;}

// ── Audio ──
var ac=null,soundOn=true,audioReady=false;
function initAudio(){
  if(audioReady)return;
  try{var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;ac=new AC();if(ac.state==='suspended')ac.resume();audioReady=true;}catch(e){}
}
function beep(freq,type,dur,vol,delay){
  if(!soundOn||!audioReady||!ac)return;
  try{
    delay=delay||0;vol=vol||0.2;
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type||'sine';o.frequency.value=freq;
    var t=ac.currentTime+delay;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }catch(e){}
}
function sfxLaser(){beep(800,'square',.06,.15);beep(400,'square',.05,.1,.04);}
function sfxExplode(){beep(180,'sawtooth',.12,.3);beep(100,'sawtooth',.15,.25,.08);}
function sfxHit(){beep(300,'sawtooth',.1,.3);beep(200,'square',.08,.2,.07);}
function sfxScore(){beep(800,'sine',.06,.18);beep(1000,'sine',.06,.18,.06);beep(1200,'sine',.08,.18,.12);}
function sfxBomb(){
  beep(80,'sawtooth',.3,.4);beep(120,'square',.25,.35,.1);
  beep(200,'sawtooth',.2,.3,.2);beep(60,'sine',.4,.3,.15);
  beep(400,'square',.1,.2,.35);
}
function sfxGameover(){beep(400,'sawtooth',.15,.3);beep(300,'sawtooth',.15,.25,.12);beep(200,'sawtooth',.2,.3,.24);beep(100,'square',.3,.2,.4);}

// ── localStorage ──
var best=0;
function loadBest(){try{best=parseInt(localStorage.getItem('alien_best')||'0')||0;}catch(e){best=0;}}
function saveBest(s){try{localStorage.setItem('alien_best',String(s));}catch(e){}}

// ── Constants ──
function GROUND_H(){return Math.round(GH()*.12);}
function UFO_W(){return Math.round(GW()*.22);}
function UFO_H(){return Math.round(GH()*.08);}

// ── Game State ──
var ufo,lasers,enemies,bullets,particles,score,lives,running,dead,animId,frameCount,lastTime,spawnTimer,diffMult;

// ── Input state ──
var keys={left:false,right:false,up:false,down:false};
var bombs=1,shotCount=0,bombAnim=0;
var touch={active:false,x:0,y:0,startX:0,startY:0};
var joystick={active:false,bx:0,by:0,dx:0,dy:0};

function initUFO(){return{x:GW()*.35,y:GH()*.08,w:UFO_W(),h:UFO_H(),hitFlash:0};}

function initState(){
  ufo=initUFO();lasers=[];enemies=[];bullets=[];particles=[];
  score=0;lives=10;bombs=1;shotCount=0;bombAnim=0;running=false;dead=false;
  frameCount=0;lastTime=0;spawnTimer=0;diffMult=1;
  animId&&cancelAnimationFrame(animId);
}

// ── Enemy types ──
var ENEMY_TYPES=[
  {type:'banhbao', w:44,h:44,color:'#F5DEB3',color2:'#DEB887',pts:2,fireRate:0.012,speed:0,maxhp:2},
  {type:'caphe',   w:34,h:46,color:'#6F4E37',color2:'#3E2723',pts:1,fireRate:0.006,speed:0.5,maxhp:2},
  {type:'chuoi',   w:38,h:40,color:'#FFD700',color2:'#FFA000',pts:1,fireRate:0.005,speed:0.7,maxhp:2},
  {type:'pho',     w:46,h:38,color:'#FF8C00',color2:'#E65100',pts:2,fireRate:0.008,speed:0.3,maxhp:2},
];

function spawnEnemy(){
  var t=ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
  var count=1+Math.floor(score/20)*1;
  if(enemies.length>=3+count) return;
  var gx=30+Math.random()*(GW()-80);
  var gy=GH()-GROUND_H()-t.h;
  enemies.push({
    x:gx,y:gy,w:t.w,h:t.h,
    type:t.type,color:t.color,color2:t.color2,pts:t.pts,
    fireRate:t.fireRate*(1+score*0.005),
    vx:(Math.random()<.5?1:-1)*t.speed*(GW()*.001),
    hp:t.maxhp||1,maxhp:t.maxhp||1,hitFlash:0,dead:false,
    fireTimer:Math.random()
  });
}

// ── Particles ──
function boom(x,y,color,n){
  for(var i=0;i<(n||12);i++){
    var angle=Math.random()*Math.PI*2;
    var spd=1+Math.random()*4;
    particles.push({
      x:x,y:y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
      life:1,color:color||'#FFD700',r:2+Math.random()*4
    });
  }
}

// ── DRAW ──
function drawSky(){
  var gr=ctx.createLinearGradient(0,0,0,GH()-GROUND_H());
  gr.addColorStop(0,'#1a0033');gr.addColorStop(.4,'#3d006b');gr.addColorStop(1,'#c2185b');
  ctx.fillStyle=gr;ctx.fillRect(0,0,GW(),GH()-GROUND_H());
  // Stars
  ctx.fillStyle='rgba(255,255,255,.6)';
  var stars=[[.08,.05],[.2,.12],[.35,.04],[.5,.09],[.65,.06],[.78,.14],[.9,.08],[.15,.2],[.55,.17],[.85,.22],[.42,.25]];
  for(var i=0;i<stars.length;i++){
    var blink=0.4+0.6*Math.sin(frameCount*.04+i*1.7);
    ctx.globalAlpha=blink*.65;
    ctx.beginPath();ctx.arc(stars[i][0]*GW(),stars[i][1]*(GH()-GROUND_H()),1.2,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Moon
  ctx.fillStyle='rgba(255,240,200,.9)';
  ctx.beginPath();ctx.arc(GW()*.85,GH()*.1,GW()*.04,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(180,160,100,.3)';
  ctx.beginPath();ctx.arc(GW()*.87,GH()*.09,GW()*.025,0,Math.PI*2);ctx.fill();
}

function drawGround(){
  var gh=GROUND_H(),y=GH()-gh;
  var gg=ctx.createLinearGradient(0,y,0,GH());
  gg.addColorStop(0,'#66BB6A');gg.addColorStop(.2,'#43A047');gg.addColorStop(1,'#2E7D32');
  ctx.fillStyle=gg;ctx.fillRect(0,y,GW(),gh);
  // Grass tufts
  ctx.fillStyle='#81C784';
  for(var i=0;i<12;i++){
    var gx=i*(GW()/11);
    ctx.beginPath();ctx.moveTo(gx,y);ctx.lineTo(gx-5,y-8);ctx.lineTo(gx+5,y-8);ctx.fill();
  }
  // City silhouette
  ctx.fillStyle='#1B5E20';
  var buildings=[[.05,.6],[.12,.45],[.2,.7],[.28,.5],[.38,.65],[.48,.4],[.56,.72],[.65,.55],[.72,.42],[.8,.68],[.88,.5],[.94,.6]];
  for(var i=0;i<buildings.length;i++){
    var b=buildings[i];
    var bw=GW()*.06,bh=gh*b[1];
    ctx.fillRect(b[0]*GW(),y-bh+gh,bw,bh);
  }
}

function drawUFO(u){
  ctx.save();
  if(u.hitFlash>0){ctx.globalAlpha=0.5+0.5*Math.sin(u.hitFlash*20);u.hitFlash-=0.08;}
  var cx=u.x+u.w/2,cy=u.y+u.h/2;
  // Glow
  var glow=ctx.createRadialGradient(cx,cy,u.w*.1,cx,cy,u.w*.7);
  glow.addColorStop(0,'rgba(100,255,200,.25)');glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.ellipse(cx,cy,u.w*.7,u.h*1.5,0,0,Math.PI*2);ctx.fill();
  // Saucer body
  var sg=ctx.createLinearGradient(u.x,u.y,u.x,u.y+u.h);
  sg.addColorStop(0,'#B0BEC5');sg.addColorStop(.5,'#90CAF9');sg.addColorStop(1,'#546E7A');
  ctx.fillStyle=sg;
  ctx.beginPath();ctx.ellipse(cx,cy+u.h*.15,u.w*.5,u.h*.35,0,0,Math.PI*2);ctx.fill();
  // Dome
  var dg=ctx.createRadialGradient(cx-u.w*.1,cy-u.h*.2,u.w*.02,cx,cy-u.h*.1,u.w*.28);
  dg.addColorStop(0,'rgba(200,255,200,.95)');dg.addColorStop(.6,'rgba(100,200,150,.7)');dg.addColorStop(1,'rgba(50,120,100,.4)');
  ctx.fillStyle=dg;
  ctx.beginPath();ctx.ellipse(cx,cy-u.h*.08,u.w*.28,u.h*.38,0,Math.PI,0);ctx.fill();
  // Dome outline
  ctx.strokeStyle='rgba(100,255,200,.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(cx,cy-u.h*.08,u.w*.28,u.h*.38,0,Math.PI,0);ctx.stroke();
  // Lights
  var lightColors=['#FFD700','#FF6B6B','#4FC3F7','#A5D6A7'];
  for(var i=0;i<4;i++){
    var lx=u.x+u.w*.15+i*(u.w*.18);
    var blink=0.5+0.5*Math.sin(frameCount*.15+i*1.5);
    ctx.fillStyle=lightColors[i];ctx.globalAlpha=blink;
    ctx.beginPath();ctx.arc(lx,cy+u.h*.18,u.w*.04,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // Tractor beam (decorative)
  var tbg=ctx.createLinearGradient(cx,cy+u.h*.3,cx,cy+u.h*1.2);
  tbg.addColorStop(0,'rgba(100,255,200,.15)');tbg.addColorStop(1,'rgba(100,255,200,0)');
  ctx.fillStyle=tbg;
  ctx.beginPath();ctx.moveTo(cx-u.w*.08,cy+u.h*.3);ctx.lineTo(cx-u.w*.2,cy+u.h*1.2);ctx.lineTo(cx+u.w*.2,cy+u.h*1.2);ctx.lineTo(cx+u.w*.08,cy+u.h*.3);ctx.closePath();ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
}

function drawFoodEmoji(emoji, x, y, size){
  ctx.font = size + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x, y);
}

function drawEnemy(e){
  if(e.dead)return;
  ctx.save();
  if(e.hitFlash>0){ctx.globalAlpha=0.4+0.6*Math.sin(e.hitFlash*25);e.hitFlash-=0.1;}
  var cx=e.x+e.w/2, cy=e.y+e.h/2;
  var sz=Math.round(e.w*1.1);

  if(e.type==='banhbao'){
    // Bánh bao - vẽ bằng canvas
    // Thân tròn trắng
    var bg=ctx.createRadialGradient(cx-e.w*.1,cy-e.h*.15,2,cx,cy,e.w*.5);
    bg.addColorStop(0,'#FFFDE7'); bg.addColorStop(.6,'#F5DEB3'); bg.addColorStop(1,'#DEB887');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.arc(cx,cy,e.w*.45,0,Math.PI*2);ctx.fill();
    // Nếp gấp trên đỉnh
    ctx.strokeStyle='rgba(180,140,80,.5)';ctx.lineWidth=1.5;
    for(var i=0;i<6;i++){
      var a=i/6*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx,cy-e.w*.1);
      ctx.lineTo(cx+Math.cos(a)*e.w*.32, cy+Math.sin(a)*e.w*.32);
      ctx.stroke();
    }
    // Chấm đỏ trên đỉnh
    ctx.fillStyle='#E53935';
    ctx.beginPath();ctx.arc(cx,cy-e.w*.38,e.w*.07,0,Math.PI*2);ctx.fill();
    // Mắt ngộ nghĩnh
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(cx-e.w*.13,cy+e.w*.05,e.w*.06,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+e.w*.13,cy+e.w*.05,e.w*.06,0,Math.PI*2);ctx.fill();
    // Miệng cười
    ctx.strokeStyle='#555';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy+e.w*.15,e.w*.12,0.1,Math.PI-.1);ctx.stroke();
    // Hơi nước
    ctx.strokeStyle='rgba(200,200,255,.6)';ctx.lineWidth=1.5;
    for(var i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(cx-e.w*.2+i*e.w*.2,e.y-4);
      ctx.quadraticCurveTo(cx-e.w*.15+i*e.w*.2,e.y-12,cx-e.w*.1+i*e.w*.2,e.y-20);
      ctx.stroke();
    }

  } else if(e.type==='caphe'){
    // Ly cà phê
    // Thân ly
    var lcx=cx, lty=e.y+e.h*.2, lby=e.y+e.h*.9;
    var lw=e.w*.4, lbw=e.w*.35;
    ctx.fillStyle='#EFEBE9';
    ctx.beginPath();
    ctx.moveTo(lcx-lw,lty); ctx.lineTo(lcx+lw,lty);
    ctx.lineTo(lcx+lbw,lby); ctx.lineTo(lcx-lbw,lby);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#BCAAA4';ctx.lineWidth=1.5;ctx.stroke();
    // Cà phê bên trong
    ctx.fillStyle='#4E342E';
    ctx.beginPath();
    ctx.moveTo(lcx-lw+3,lty+4); ctx.lineTo(lcx+lw-3,lty+4);
    ctx.lineTo(lcx+lbw-2,lby-3); ctx.lineTo(lcx-lbw+2,lby-3);
    ctx.closePath(); ctx.fill();
    // Bọt trắng
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.beginPath();ctx.ellipse(lcx,lty+6,lw-4,6,0,0,Math.PI*2);ctx.fill();
    // Tay cầm
    ctx.strokeStyle='#BCAAA4';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(lcx+lw+4,(lty+lby)/2,8,Math.PI*-.4,Math.PI*.4);
    ctx.stroke();
    // Hơi nước bốc lên
    ctx.strokeStyle='rgba(200,200,255,.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(lcx-6,lty-2);ctx.quadraticCurveTo(lcx-10,lty-10,lcx-6,lty-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(lcx+6,lty-4);ctx.quadraticCurveTo(lcx+10,lty-12,lcx+6,lty-20);ctx.stroke();
    // Mắt trên thân ly
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(lcx-6,lby-e.h*.35,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(lcx+6,lby-e.h*.35,2.5,0,Math.PI*2);ctx.fill();

  } else if(e.type==='chuoi'){
    // Chuối
    ctx.save();ctx.translate(cx,cy);
    // Thân cong
    var cg2=ctx.createLinearGradient(-e.w*.4,-e.h*.3,e.w*.4,e.h*.3);
    cg2.addColorStop(0,'#FFF176');cg2.addColorStop(.5,'#FFD600');cg2.addColorStop(1,'#F9A825');
    ctx.fillStyle=cg2;
    ctx.beginPath();
    ctx.moveTo(-e.w*.4,e.h*.2);
    ctx.quadraticCurveTo(-e.w*.1,-e.h*.5,e.w*.4,-e.h*.2);
    ctx.quadraticCurveTo(e.w*.5,e.h*.0,e.w*.3,e.h*.35);
    ctx.quadraticCurveTo(e.w*.0,e.h*.55,-e.w*.35,e.h*.35);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#F9A825';ctx.lineWidth=1;ctx.stroke();
    // Đầu cuống
    ctx.fillStyle='#5D4037';
    ctx.beginPath();ctx.arc(-e.w*.38,e.h*.22,4,0,Math.PI*2);ctx.fill();
    // Mắt
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(-e.w*.05,-e.h*.05,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.w*.15,-e.h*.1,3,0,Math.PI*2);ctx.fill();
    ctx.restore();

  } else if(e.type==='pho'){
    // Tô phở
    var pw=e.w*.5,ph=e.h*.35;
    // Đế tô
    ctx.fillStyle='#ECEFF1';
    ctx.beginPath();ctx.ellipse(cx,e.y+e.h*.85,pw*.8,ph*.3,0,0,Math.PI*2);ctx.fill();
    // Thân tô
    ctx.fillStyle='#FAFAFA';
    ctx.beginPath();
    ctx.moveTo(cx-pw,e.y+e.h*.5);
    ctx.quadraticCurveTo(cx-pw*.9,e.y+e.h*.88,cx-pw*.55,e.y+e.h*.9);
    ctx.lineTo(cx+pw*.55,e.y+e.h*.9);
    ctx.quadraticCurveTo(cx+pw*.9,e.y+e.h*.88,cx+pw,e.y+e.h*.5);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#CFD8DC';ctx.lineWidth=1.5;ctx.stroke();
    // Nước dùng vàng
    ctx.fillStyle='rgba(255,160,0,.6)';
    ctx.beginPath();ctx.ellipse(cx,e.y+e.h*.52,pw*.92,ph*.38,0,0,Math.PI*2);ctx.fill();
    // Sợi phở (noodles)
    ctx.strokeStyle='rgba(255,236,179,.9)';ctx.lineWidth=2;
    for(var i=0;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(cx-pw*.6+i*pw*.35, e.y+e.h*.5);
      ctx.quadraticCurveTo(cx-pw*.4+i*pw*.35+8, e.y+e.h*.65, cx-pw*.5+i*pw*.35, e.y+e.h*.78);
      ctx.stroke();
    }
    // Hành lá
    ctx.fillStyle='#66BB6A';
    ctx.beginPath();ctx.ellipse(cx-pw*.2,e.y+e.h*.5,4,2,0.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+pw*.15,e.y+e.h*.48,4,2,-0.3,0,Math.PI*2);ctx.fill();
    // Mắt trên thành tô
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(cx-8,e.y+e.h*.55,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+8,e.y+e.h*.55,2.5,0,Math.PI*2);ctx.fill();
    // Khói
    ctx.strokeStyle='rgba(200,200,255,.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,e.y+e.h*.4);ctx.quadraticCurveTo(cx-6,e.y+e.h*.25,cx,e.y+e.h*.1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+10,e.y+e.h*.42);ctx.quadraticCurveTo(cx+16,e.y+e.h*.27,cx+10,e.y+e.h*.12);ctx.stroke();
  }
  // HP bar
  if(!e.dead && e.maxhp>1){
    var barW=e.w-4, barH=5;
    var bx=e.x+2, by=e.y-10;
    ctx.globalAlpha=0.85;
    ctx.fillStyle='#333';ctx.beginPath();ctx.roundRect(bx,by,barW,barH,2);ctx.fill();
    var hpPct=e.hp/e.maxhp;
    ctx.fillStyle=hpPct>.5?'#4CAF50':hpPct>.25?'#FF9800':'#F44336';
    ctx.beginPath();ctx.roundRect(bx,by,barW*hpPct,barH,2);ctx.fill();
  }
  // HP bar
  if(e.maxhp>1){
    var barW=e.w-4, barH=5;
    var hbx=e.x+2, hby=e.y-10;
    ctx.globalAlpha=0.85;
    ctx.fillStyle='#333';ctx.beginPath();ctx.roundRect(hbx,hby,barW,barH,2);ctx.fill();
    var hpPct=e.hp/e.maxhp;
    ctx.fillStyle=hpPct>.5?'#4CAF50':hpPct>.25?'#FF9800':'#F44336';
    ctx.beginPath();ctx.roundRect(hbx,hby,Math.max(barW*hpPct,0),barH,2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.restore();
}

function drawLasers(){
  for(var i=0;i<lasers.length;i++){
    var l=lasers[i];
    // Glow
    ctx.shadowColor='#00FF88';ctx.shadowBlur=12;
    ctx.strokeStyle='#00FF88';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x,l.y+l.len);ctx.stroke();
    // Core
    ctx.strokeStyle='#CCFFEE';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x,l.y+l.len);ctx.stroke();
    ctx.shadowBlur=0;
  }
}

var FOOD_BULLETS=['🍖','🌶','🧄','🥚','🍋','🥕','🍅','🌽'];
function drawBullets(){
  for(var i=0;i<bullets.length;i++){
    var blt=bullets[i];
    ctx.save();
    ctx.font='14px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    // Xoay theo hướng bay lên
    ctx.translate(blt.x,blt.y);
    ctx.rotate(frameCount*0.15);
    ctx.fillText(FOOD_BULLETS[i%FOOD_BULLETS.length],0,0);
    ctx.restore();
  }
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawJoystick(){
  // Virtual joystick hint on mobile (bottom left)
  if(!touch.active) return;
}

function drawControlHint(){
  if(frameCount>180||!running) return;
  ctx.save();
  ctx.textAlign='center';
  ctx.font=Math.round(GW()*.032)+'px -apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText('Kéo di chuyển · Chạm bắn · 2 chạm = BOM',GW()/2,GH()*.94);
  ctx.restore();
}

function drawBombButton(){
  if(!running) return;
  // Bomb button bottom right
  var bx=GW()*.78, by=GH()*.88, br=GW()*.1;
  // Glow when available
  if(bombs>0){
    ctx.shadowColor='#FF4500';ctx.shadowBlur=16;
  }
  ctx.fillStyle=bombs>0?'rgba(255,69,0,.85)':'rgba(80,80,80,.5)';
  ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Icon
  ctx.textAlign='center';ctx.font=Math.round(br*.9)+'px serif';
  ctx.fillText('💣',bx,by+br*.35);
  // Count
  if(bombs>0){
    ctx.font='bold '+Math.round(br*.55)+'px -apple-system,sans-serif';
    ctx.fillStyle='#fff';
    ctx.fillText('x'+bombs,bx,by-br*.5);
  }
  // Bomb nuke animation
  if(bombAnim>0){
    var alpha=bombAnim/40;
    ctx.fillStyle='rgba(255,255,100,'+alpha*.7+')';
    ctx.fillRect(0,0,GW(),GH()-GROUND_H());
    ctx.textAlign='center';
    ctx.font='bold '+Math.round(GW()*.14)+'px -apple-system,sans-serif';
    ctx.fillStyle='rgba(255,69,0,'+alpha+')';
    ctx.fillText('☢️ BOOM! ☢️',GW()/2,GH()*.42);
    bombAnim--;
  }
}

function drawHUD(){
  ctx.save();
  // Score
  ctx.textAlign='center';
  ctx.font='900 '+Math.round(GW()*.09)+'px -apple-system,sans-serif';
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillText(String(score),GW()/2+2,GH()*.08+2);
  ctx.fillStyle='#fff';ctx.fillText(String(score),GW()/2,GH()*.08);
  // Lives
  ctx.font=Math.round(GW()*.065)+'px serif';
  ctx.textAlign='left';
  // Draw lives as number + icon
  ctx.globalAlpha=1;
  ctx.font=Math.round(GW()*.05)+'px serif';
  ctx.fillText('❤️',GW()*.04,GH()*.065);
  ctx.font='bold '+Math.round(GW()*.045)+'px -apple-system,sans-serif';
  ctx.fillStyle='#FF5252';
  ctx.fillText('x'+lives,GW()*.115,GH()*.065);
  ctx.globalAlpha=1;
  // Best
  ctx.font=Math.round(GW()*.036)+'px -apple-system,sans-serif';
  ctx.textAlign='right';
  ctx.fillStyle='rgba(255,255,255,.45)';
  ctx.fillText('BEST '+best,GW()*.97,GH()*.065);
  ctx.restore();
}

function drawAll(){
  ctx.clearRect(0,0,GW(),GH());
  drawSky();drawGround();
  drawLasers();
  for(var i=0;i<enemies.length;i++) drawEnemy(enemies[i]);
  drawBullets();drawParticles();
  drawUFO(ufo);drawJoystick();drawHUD();drawBombButton();drawControlHint();
}

// ── Shoot laser ──
function shoot(){
  if(!running||dead)return;
  var cx=ufo.x+ufo.w/2;
  lasers.push({x:cx,y:ufo.y+ufo.h,vy:GH()*.018,len:GH()*.06});
  sfxLaser();
  shotCount++;
  if(shotCount>=30){shotCount=0;bombs=Math.min(bombs+1,3);sfxScore();}
}

function useBomb(){
  if(!running||dead||bombs<=0)return;
  bombs--;bombAnim=40;
  // Nuke all enemies
  for(var i=0;i<enemies.length;i++){
    boom(enemies[i].x+enemies[i].w/2,enemies[i].y+enemies[i].h/2,'#FFD700',20);
    boom(enemies[i].x+enemies[i].w/2,enemies[i].y+enemies[i].h/2,'#FF5252',12);
    score+=enemies[i].pts;
    if(score>best){best=score;saveBest(best);}
  }
  enemies=[];lasers=[];
  sfxBomb();
}

// ── LOOP ──
function loop(ts){
  if(!running||dead)return;
  try{
    var dt=Math.min((ts-lastTime)/16.67,2.5);
    lastTime=ts;frameCount++;
    diffMult=1+Math.floor(score/20)*.08;

    // UFO player control
    var spd=GW()*.006*dt;
    if(keys.left&&ufo.x>0) ufo.x-=spd;
    if(keys.right&&ufo.x+ufo.w<GW()) ufo.x+=spd;
    if(keys.up&&ufo.y>4) ufo.y-=spd*.8;
    if(keys.down&&ufo.y+ufo.h<GH()*.5) ufo.y+=spd*.8;
    // Touch drag
    if(touch.active){
      var tx=touch.x-ufo.w/2, ty=touch.y-ufo.h/2;
      tx=Math.max(0,Math.min(GW()-ufo.w,tx));
      ty=Math.max(0,Math.min(GH()*.5,ty));
      ufo.x+=(tx-ufo.x)*.18*dt;
      ufo.y+=(ty-ufo.y)*.18*dt;
    }

    // Spawn enemies
    spawnTimer+=dt;
    if(spawnTimer>60/diffMult){spawnTimer=0;spawnEnemy();}

    // Update enemies
    for(var ei=enemies.length-1;ei>=0;ei--){
      var em=enemies[ei];
      if(em.dead){enemies.splice(ei,1);continue;}
      // Move
      em.x+=em.vx*dt;
      if(em.x<0||em.x+em.w>GW()) em.vx*=-1;
      // Fire
      em.fireTimer+=em.fireRate*diffMult*dt;
      if(em.fireTimer>=1){
        em.fireTimer=0;
        bullets.push({x:em.x+em.w/2,y:em.y,vy:-GH()*.01});
      }
    }

    // Update lasers
    for(var li=lasers.length-1;li>=0;li--){
      var l=lasers[li];
      l.y+=l.vy*dt;
      if(l.y>GH()){lasers.splice(li,1);continue;}
      // Hit enemy
      var hit=false;
      for(var ej=enemies.length-1;ej>=0;ej--){
        var en=enemies[ej];
        if(en.dead)continue;
        if(l.x>en.x&&l.x<en.x+en.w&&l.y>en.y&&l.y<en.y+en.h){
          boom(l.x,l.y+l.len/2,'#FFD700',5);
          sfxExplode();
          en.hp--;en.hitFlash=0.6;
          if(en.hp<=0){
            boom(en.x+en.w/2,en.y+en.h/2,'#FFD700',16);
            en.dead=true;score++;
            if(score>best){best=score;saveBest(best);}
          }
          lasers.splice(li,1);hit=true;break;
        }
      }
      if(!hit&&li>=0&&lasers[li]&&lasers[li].y+lasers[li].len>GH()-GROUND_H()){
        boom(lasers[li].x,GH()-GROUND_H(),'#A5D6A7',6);
        lasers.splice(li,1);
      }
    }

    // Update bullets
    for(var bi=bullets.length-1;bi>=0;bi--){
      var bul=bullets[bi];
      bul.y+=bul.vy*dt;
      if(bul.y<0){bullets.splice(bi,1);continue;}
      // Hit UFO
      if(bul.x>ufo.x&&bul.x<ufo.x+ufo.w&&bul.y>ufo.y&&bul.y<ufo.y+ufo.h){
        boom(bul.x,bul.y,'#FF5252',8);
        sfxHit();
        ufo.hitFlash=1;
        bullets.splice(bi,1);
        lives--;
        if(lives<=0){setTimeout(endGame,400);dead=true;return;}
      }
    }

    // Update particles
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.15*dt;p.life-=0.03*dt;
      if(p.life<=0)particles.splice(i,1);
    }

    drawAll();
    animId=requestAnimationFrame(loop);
  }catch(e){console.error(e);}
}

// ── Game flow ──
function startGame(){
  try{
    initAudio();initState();running=true;
    document.getElementById('ostart').style.display='none';
    document.getElementById('ogo').style.display='none';
    lastTime=performance&&performance.now?performance.now():Date.now();
    animId=requestAnimationFrame(loop);
  }catch(e){console.error(e);}
}

function endGame(){
  try{
    dead=true;running=false;
    sfxGameover();
    loadBest();
    if(score>best){best=score;saveBest(best);}
    animId&&cancelAnimationFrame(animId);
    drawAll();
    setTimeout(function(){
      document.getElementById('goscore').textContent=score;
      document.getElementById('gobest').textContent=best;
      document.getElementById('ogo').style.display='flex';
    },700);
  }catch(e){}
}

// ── Events ──
// Keyboard
document.addEventListener('keydown',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA'){keys.left=true;e.preventDefault();}
  if(e.code==='ArrowRight'||e.code==='KeyD'){keys.right=true;e.preventDefault();}
  if(e.code==='ArrowUp'||e.code==='KeyW'){keys.up=true;e.preventDefault();}
  if(e.code==='ArrowDown'||e.code==='KeyS'){keys.down=true;e.preventDefault();}
  if(e.code==='Space'){e.preventDefault();if(!running&&!dead){startGame();return;}shoot();}
  if(e.code==='KeyB'){e.preventDefault();useBomb();}
});
document.addEventListener('keyup',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
  if(e.code==='ArrowUp'||e.code==='KeyW') keys.up=false;
  if(e.code==='ArrowDown'||e.code==='KeyS') keys.down=false;
});

// Touch: drag UFO + tap to shoot
var lastTap=0;
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();e.stopPropagation();
  if(!running&&!dead){startGame();return;}
  var t=e.touches[0];
  var rect=canvas.getBoundingClientRect();
  var scaleX=GW()/rect.width, scaleY=GH()/rect.height;
  touch.startX=(t.clientX-rect.left)*scaleX;
  touch.startY=(t.clientY-rect.top)*scaleY;
  touch.x=touch.startX; touch.y=touch.startY;
  touch.active=true;
  var now=Date.now();
  // Double tap = bomb
  if(now-lastTap<300){useBomb();lastTap=0;return;}
  lastTap=now;
  // Tap bomb button area
  var bbx=GW()*.78,bby=GH()*.88,bbr=GW()*.1;
  var dx=touch.startX-bbx,dy=touch.startY-bby;
  if(dx*dx+dy*dy<bbr*bbr*1.4){useBomb();return;}
  // Tap to shoot if not near UFO
  var distUFO=Math.abs(touch.startX-(ufo.x+ufo.w/2));
  if(distUFO>ufo.w*.8) shoot();
},{passive:false,capture:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  var t=e.touches[0];
  var rect=canvas.getBoundingClientRect();
  var scaleX=GW()/rect.width, scaleY=GH()/rect.height;
  touch.x=(t.clientX-rect.left)*scaleX;
  touch.y=(t.clientY-rect.top)*scaleY;
},{passive:false});

canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  touch.active=false;
},{passive:false});

// Mouse
canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  if(e.pointerType==='touch') return;
  if(!running&&!dead){startGame();return;}
  shoot();
},{passive:false});
document.getElementById('bstart').addEventListener('touchend',function(e){e.preventDefault();startGame();},{passive:false});
document.getElementById('bstart').addEventListener('click',function(e){e.preventDefault();startGame();});
document.getElementById('bagain').addEventListener('touchend',function(e){e.preventDefault();startGame();},{passive:false});
document.getElementById('bagain').addEventListener('click',function(e){e.preventDefault();startGame();});
document.addEventListener('visibilitychange',function(){if(document.hidden&&running)running=false;});
window.addEventListener('orientationchange',function(){setTimeout(function(){resize();drawAll();},300);});
window.addEventListener('resize',function(){resize();if(!running)drawAll();});

// ── Init ──
loadBest();resize();initState();drawAll();
</script>
