<script>
// ── roundRect polyfill ──
(function(){
  var p=CanvasRenderingContext2D.prototype;
  if(p.roundRect)return;
  p.roundRect=function(x,y,w,h,r){
    if(Array.isArray(r))r=r[0]||0;
    r=Math.min(Number(r)||0,Math.abs(w)/2,Math.abs(h)/2);
    if(r<=0){this.rect(x,y,w,h);return this;}
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x+r,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();return this;
  };
})();

var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);

function resize(){
  var vw=window.innerWidth,vh=window.innerHeight;
  var cw=vw<=500?vw-8:Math.min(vw-24,420);
  var ch=vw<=500?vh-20:Math.min(vh-20,700);
  if(cw/ch>0.65){cw=Math.round(ch*0.62);}else{ch=Math.round(cw/0.62);}
  canvas.style.width=cw+'px';canvas.style.height=ch+'px';
  canvas.width=Math.round(cw*DPR);canvas.height=Math.round(ch*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
function GW(){return parseInt(canvas.style.width)||canvas.width/DPR;}
function GH(){return parseInt(canvas.style.height)||canvas.height/DPR;}

// ── Audio ──
var ac=null,soundOn=true,audioReady=false;
function initAudio(){
  if(audioReady)return;
  try{var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;ac=new AC();if(ac.state==='suspended')ac.resume();audioReady=true;}catch(e){}
}
function beep(freq,type,dur,vol,delay){
  if(!soundOn||!audioReady||!ac)return;
  try{
    delay=delay||0;vol=vol||0.2;
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type||'sine';o.frequency.value=freq;
    var t=ac.currentTime+delay;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }catch(e){}
}
function sfxLaser(){beep(800,'square',.06,.15);beep(400,'square',.05,.1,.04);}
function sfxExplode(){beep(180,'sawtooth',.12,.3);beep(100,'sawtooth',.15,.25,.08);}
function sfxHit(){beep(300,'sawtooth',.1,.3);beep(200,'square',.08,.2,.07);}
function sfxScore(){beep(800,'sine',.06,.18);beep(1000,'sine',.06,.18,.06);beep(1200,'sine',.08,.18,.12);}
function sfxBomb(){
  beep(80,'sawtooth',.3,.4);beep(120,'square',.25,.35,.1);
  beep(200,'sawtooth',.2,.3,.2);beep(60,'sine',.4,.3,.15);
  beep(400,'square',.1,.2,.35);
}
function sfxGameover(){beep(400,'sawtooth',.15,.3);beep(300,'sawtooth',.15,.25,.12);beep(200,'sawtooth',.2,.3,.24);beep(100,'square',.3,.2,.4);}

// ── localStorage ──
var best=0;
function loadBest(){try{best=parseInt(localStorage.getItem('alien_best')||'0')||0;}catch(e){best=0;}}
function saveBest(s){try{localStorage.setItem('alien_best',String(s));}catch(e){}}

// ── Constants ──
function GROUND_H(){return Math.round(GH()*.12);}
function UFO_W(){return Math.round(GW()*.22);}
function UFO_H(){return Math.round(GH()*.08);}

// ── Game State ──
var ufo,lasers,enemies,bullets,particles,score,lives,running,dead,animId,frameCount,lastTime,spawnTimer,diffMult;

// ── Input state ──
var keys={left:false,right:false,up:false,down:false};
var bombs=1,shotCount=0,bombAnim=0;
var touch={active:false,x:0,y:0,id:null};
var autoShootTimer=0; // Biến đếm thời gian tự động bắn khi chạm màn hình

function initUFO(){return{x:GW()*.35,y:GH()*.08,w:UFO_W(),h:UFO_H(),hitFlash:0};}

function initState(){
  ufo=initUFO();lasers=[];enemies=[];bullets=[];particles=[];
  score=0;lives=10;bombs=1;shotCount=0;bombAnim=0;running=false;dead=false;
  frameCount=0;lastTime=0;spawnTimer=0;diffMult=1;
  touch={active:false,x:0,y:0,id:null};
  autoShootTimer=0;
  animId&&cancelAnimationFrame(animId);
}

// ── Enemy types ──
var ENEMY_TYPES=[
  {type:'cannon',w:36,h:44,color:'#FF9800',color2:'#E65100',pts:2,fireRate:0.012,speed:0,maxhp:2},
  {type:'robot', w:30,h:42,color:'#2196F3',color2:'#0D47A1',pts:1,fireRate:0.006,speed:0.5,maxhp:2},
];

function spawnEnemy(){
  var t=ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
  var count=1+Math.floor(score/20)*1;
  if(enemies.length>=3+count) return;
  var gx=30+Math.random()*(GW()-80);
  var gy=GH()-GROUND_H()-t.h;
  enemies.push({
    x:gx,y:gy,w:t.w,h:t.h,
    type:t.type,color:t.color,color2:t.color2,pts:t.pts,
    fireRate:t.fireRate*(1+score*0.005),
    vx:(Math.random()<.5?1:-1)*t.speed*(GW()*.001),
    hp:t.maxhp||1,maxhp:t.maxhp||1,hitFlash:0,dead:false,
    fireTimer:Math.random()
  });
}

// ── Particles ──
function boom(x,y,color,n){
  for(var i=0;i<(n||12);i++){
    var angle=Math.random()*Math.PI*2;
    var spd=1+Math.random()*4;
    particles.push({
      x:x,y:y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
      life:1,color:color||'#FFD700',r:2+Math.random()*4
    });
  }
}

// ── DRAW ──
function drawSky(){

  gr.addColorStop(0,'#
